seed: 42
device: cuda
dtype: auto
validation_level: gpu_reduced

# Replace with locally available/publicly accessible 1B and 7B/8B causal LMs.
draft_model: ${DRAFTVERIFY_DRAFT_MODEL:-meta-llama/Llama-3.2-1B}
verifier_model: ${DRAFTVERIFY_VERIFIER_MODEL:-meta-llama/Llama-3.1-8B}

max_new_tokens: 64
temperatures: [0.0, 0.7]
draft_ks: [1, 2, 4]
prompt_types:
  - code_completion
  - structured_json
  - open_ended
repetitions: 1
batch_size: 1
warmup_runs: 1
torch_compile: false
local_files_only: false
schedules: [static, adaptive]
adaptive_policies:
  - confidence_threshold
  - rolling_acceptance

