seed: 42
device: cuda
dtype: auto

# Replace these with locally available Llama-compatible checkpoints before running.
# Examples that may fit the intended scale if you have access and disk space:
# draft_model: meta-llama/Llama-3.2-1B
# verifier_model: meta-llama/Llama-3.1-8B
draft_model: ${DRAFTVERIFY_DRAFT_MODEL:-meta-llama/Llama-3.2-1B}
verifier_model: ${DRAFTVERIFY_VERIFIER_MODEL:-meta-llama/Llama-3.1-8B}

validation_level: gpu_full
max_new_tokens: 128
temperatures: [0.0, 0.3, 0.7]
draft_ks: [1, 2, 4, 8]
prompt_types:
  - code_completion
  - structured_json
  - factual_qa
  - summarization
  - open_ended
repetitions: 3
batch_size: 1
warmup_runs: 1
torch_compile: false
local_files_only: false
schedules: [static]
adaptive_policies:
  - confidence_threshold
  - rolling_acceptance

