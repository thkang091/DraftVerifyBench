seed: 42
device: cuda
dtype: auto
draft_model: ${DRAFTVERIFY_DRAFT_MODEL:-meta-llama/Llama-3.2-1B}
verifier_model: ${DRAFTVERIFY_VERIFIER_MODEL:-meta-llama/Llama-3.1-8B}
max_new_tokens: 64
temperatures: [0.0, 0.3, 0.7, 1.0]
draft_ks: [1, 2, 4, 8]
prompt_types:
  - code_completion
  - structured_json
  - factual_qa
  - summarization
  - open_ended
repetitions: 3
batch_size: 1
warmup_runs: 1
schedules: [static, adaptive]
adaptive_policies:
  - confidence_threshold
  - entropy_threshold
  - rolling_acceptance
adaptive_variants:
  - name: confidence_conservative
    policy: confidence_threshold
    confidence_thresholds: {"0.95": 8, "0.85": 4, "0.70": 2}
  - name: confidence_default
    policy: confidence_threshold
    confidence_thresholds: {"0.85": 8, "0.70": 4, "0.50": 2}
  - name: confidence_aggressive
    policy: confidence_threshold
    confidence_thresholds: {"0.70": 8, "0.50": 4, "0.30": 2}
  - name: entropy_conservative
    policy: entropy_threshold
    entropy_thresholds: {"1.5": 8, "3.0": 4, "4.5": 2}
  - name: entropy_default
    policy: entropy_threshold
    entropy_thresholds: {"2.0": 8, "4.0": 4, "6.0": 2}
  - name: entropy_aggressive
    policy: entropy_threshold
    entropy_thresholds: {"3.0": 8, "6.0": 4, "8.0": 2}
  - name: rolling_w2
    policy: rolling_acceptance
    rolling_acceptance_window: 2
  - name: rolling_w4
    policy: rolling_acceptance
    rolling_acceptance_window: 4
  - name: rolling_w8
    policy: rolling_acceptance
    rolling_acceptance_window: 8

