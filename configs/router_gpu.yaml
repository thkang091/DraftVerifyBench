seed: 42
device: cuda
dtype: auto
draft_model: ${DRAFTVERIFY_DRAFT_MODEL:-meta-llama/Llama-3.2-1B}
verifier_model: ${DRAFTVERIFY_VERIFIER_MODEL:-meta-llama/Llama-3.1-8B}
max_new_tokens: 64
temperatures: [0.0, 0.3, 0.7]
draft_ks: [4]
prompt_types:
  - code_completion
  - structured_json
  - factual_qa
  - summarization
  - open_ended
repetitions: 2
batch_size: 1
warmup_runs: 1
router_policy: feature_threshold_router
router_static_draft_k: 4
router_adaptive_policy: confidence_threshold
router_entropy_threshold: 5.0
router_top1_threshold: 0.25

