seed: 42
device: auto
dtype: auto
draft_model: distilgpt2
verifier_model: gpt2
max_new_tokens: 8
temperatures: [0.0, 0.7]
draft_ks: [4]
prompt_types:
  - code_completion
  - structured_json
  - factual_qa
  - summarization
  - open_ended
repetitions: 1
batch_size: 1
warmup_runs: 0
router_policy: feature_threshold_router
router_policies:
  - always_baseline
  - always_speculative_best_static
  - always_adaptive
  - feature_threshold_router
router_static_draft_k: 4
router_adaptive_policy: confidence_threshold
router_entropy_threshold: 5.0
router_top1_threshold: 0.25
