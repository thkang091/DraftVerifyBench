seed: 42
device: cuda
dtype: auto
validation_level: gpu_qwen_reduced_repeats

draft_model: Qwen/Qwen2.5-0.5B-Instruct
verifier_model: Qwen/Qwen2.5-7B-Instruct

max_new_tokens: 64
temperatures: [0.0, 0.7]
draft_ks: [1, 2, 4]
prompt_types:
  - code_completion
  - structured_json
  - open_ended
repetitions: 5
batch_size: 1
warmup_runs: 1
torch_compile: false
local_files_only: false
schedules: [static, adaptive]
adaptive_policies:
  - confidence_threshold
  - rolling_acceptance
